name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: pip install pytest pytest-cov zstandard orjson maturin

      - name: Build wheel
        run: maturin build --release -i python${{ matrix.python-version }} --out dist

      - name: Install wheel
        run: pip install dist/splunk_ddss_extractor-*.whl

      - name: Run tests
        run: pytest tests/ -v
